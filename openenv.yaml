name: "Email Triage Agent"
description: "A real-world task environment where an agent acts as an executive assistant, triaging a chaotic inbox, deleting spam, sorting newsletters, categorizing tech support issues, and drafting critical manager synthesis replies."
github_url: "https://github.com/SwayamChopda/openenv-email-triage"
tags:
  - email
  - assistant
  - text-based
  - logic
tasks:
  - id: "easy"
    description: "Move all HR emails to the HR folder. Leave general emails in the inbox."
  - id: "medium"
    description: "Categorize support emails into 'Tech' and 'Spam/Marketing'. Reply to refund requests and move them to 'Refunds_Processed'."
  - id: "hard"
    description: "Delete spam to 'Trash'. Categorize newsletter to 'Newsletters'. MOST IMPORTANTLY: Reply to the manager synthesizing the 3 dev emails about Project Alpha (status, blocker, and deployment day)."
